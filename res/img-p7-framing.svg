<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <defs>
    <linearGradient id="good" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="bad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFEBEE"/>
      <stop offset="100%" style="stop-color:#FFCDD2"/>
    </linearGradient>
  </defs>
  <rect fill="#F5F0E8" width="700" height="200" rx="8"/>
  <rect x="20" y="30" width="300" height="150" rx="8" fill="url(#bad)" stroke="#E0A8A8" stroke-width="1"/>
  <text x="170" y="60" text-anchor="middle" font-family="serif" font-size="14" fill="#6B5D4F" font-weight="600">损失框架</text>
  <text x="70" y="85" font-family="sans-serif" font-size="11" fill="#8B6E6E">失误率 35%</text>
  <text x="70" y="105" font-family="sans-serif" font-size="11" fill="#8B6E6E">比同水平慢 15%</text>
  <text x="70" y="125" font-family="sans-serif" font-size="11" fill="#8B6E6E">训练天数不足</text>
  <text x="70" y="145" font-family="sans-serif" font-size="11" fill="#8B6E6E">反手是最弱环节</text>
  <text x="170" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B57373" font-style="italic">我不行。</text>
  <line x1="350" y1="40" x2="350" y2="170" stroke="#C4A65A" stroke-width="1.5" stroke-dasharray="4,4"/>
  <circle cx="350" cy="30" r="18" fill="#C4A65A"/>
  <text x="350" y="35" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white">=</text>
  <text x="350" y="78" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6B5D4F">同一组数据</text>
  <rect x="380" y="30" width="300" height="150" rx="8" fill="url(#good)" stroke="#87A96B" stroke-width="1"/>
  <text x="530" y="60" text-anchor="middle" font-family="serif" font-size="14" fill="#6B5D4F" font-weight="600">增益框架</text>
  <text x="430" y="85" font-family="sans-serif" font-size="11" fill="#5A7A44">上线率 65%</text>
  <text x="430" y="105" font-family="sans-serif" font-size="11" fill="#5A7A44">达同水平 85% 分位</text>
  <text x="430" y="125" font-family="sans-serif" font-size="11" fill="#5A7A44">已在球场 12 天</text>
  <text x="430" y="145" font-family="sans-serif" font-size="11" fill="#5A7A44">正手已是可靠武器</text>
  <text x="530" y="170" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6D8B55" font-style="italic">我在变好。</text>
</svg>